<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CyberAttack Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .user-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .user-card:hover {
            background: #334155;
            transform: translateX(4px);
        }
        .user-card .role-badge {
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="login-container d-flex align-items-center justify-content-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5 col-lg-4">
                    <div class="login-card text-center">
                        <i class="bi bi-shield-lock-fill" style="font-size: 3rem; color: #06b6d4;"></i>
                        <h2 class="mt-3 glow-text" style="color: white;">CyberAttack Simulator</h2>
                        <p style="color: #cbd5e1;">Security Operations Dashboard</p>
                        
                        <div id="errorAlert" class="alert alert-danger mt-3" style="display: none; background: #450a0a; border-color: #ef4444; color: white;">
                            <i class="bi bi-exclamation-triangle"></i> Invalid credentials. Please check username and password.
                        </div>
                        
                        <form id="loginForm" class="mt-4">
                            <div class="mb-3">
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="username" placeholder="Username" autocomplete="off">
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control bg-dark text-white border-secondary" id="password" placeholder="Password">
                            </div>
                            <div id="roleHint"></div>
                            <button type="submit" id="loginBtn" class="btn btn-cyber w-100">
                                <i class="bi bi-shield-lock"></i> Login
                            </button>
                        </form>
                        
                        <!-- Demo Users Section -->
                        <div class="mt-4">
                            <p class="small" style="color: #cbd5e1;"><i class="bi bi-people"></i> Demo Accounts (Click to auto-fill)</p>
                            <div class="row g-2">
                                <div class="col-6">
                                    <div class="user-card" onclick="document.getElementById('username').value='admin'; document.getElementById('password').value='admin123';">
                                        <i class="bi bi-crown text-warning"></i>
                                        <strong style="color: white;">Admin</strong>
                                        <span class="badge bg-danger d-block mt-1">Full Access</span>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="user-card" onclick="document.getElementById('username').value='analyst'; document.getElementById('password').value='analyst123';">
                                        <i class="bi bi-eye text-info"></i>
                                        <strong style="color: white;">Analyst</strong>
                                        <span class="badge bg-primary d-block mt-1">Read + Export</span>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="user-card" onclick="document.getElementById('username').value='viewer'; document.getElementById('password').value='viewer123';">
                                        <i class="bi bi-person text-secondary"></i>
                                        <strong style="color: white;">Viewer</strong>
                                        <span class="badge bg-secondary d-block mt-1">Limited Access</span>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="user-card" onclick="document.getElementById('username').value='responder'; document.getElementById('password').value='responder123';">
                                        <i class="bi bi-shield text-success"></i>
                                        <strong style="color: white;">Responder</strong>
                                        <span class="badge bg-success d-block mt-1">Incident Response</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <p class="mt-4 small" style="color: #cbd5e1;">
                            <i class="bi bi-info-circle"></i> Role-based access control enabled
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
